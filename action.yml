name: Lockfile Integrity Check
description: Detects lockfile changes without corresponding package.json modifications — a supply chain tamper signal

branding:
  icon: shield
  color: orange

inputs:
  base-ref:
    description: Base branch for comparison (e.g. main)
    required: true
  lockfile:
    description: Path to the lockfile to monitor (auto-detects from changed files if not set)
    required: false
    default: ""
  fail-on-warning:
    description: Whether to fail the check (exit 1) or just warn
    required: false
    default: "true"

outputs:
  tampered:
    description: Whether lockfile tampering was detected ("true" or "false")
    value: ${{ steps.check.outputs.tampered }}
  lockfiles:
    description: Space-separated list of lockfiles that were modified
    value: ${{ steps.check.outputs.lockfiles }}

runs:
  using: composite
  steps:
    - name: Check for corresponding package.json changes
      id: check
      shell: bash
      env:
        BASE_REF: ${{ inputs.base-ref }}
        LOCKFILE: ${{ inputs.lockfile }}
        FAIL_ON_WARNING: ${{ inputs.fail-on-warning }}
      run: |
        KNOWN_LOCKFILES=(pnpm-lock.yaml package-lock.json yarn.lock bun.lock)
        CHANGED_FILES=$(git diff --name-only "origin/$BASE_REF"...HEAD)

        LOCKFILES=()
        if [ -n "$LOCKFILE" ]; then
          LOCKFILES=("$LOCKFILE")
        else
          for lf in "${KNOWN_LOCKFILES[@]}"; do
            if echo "$CHANGED_FILES" | grep -qF "$lf"; then
              LOCKFILES+=("$lf")
            fi
          done
        fi

        if [ ${#LOCKFILES[@]} -eq 0 ]; then
          echo "No lockfile changes detected. Skipping check."
          echo "tampered=false" >> "$GITHUB_OUTPUT"
          echo "lockfiles=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "lockfiles=${LOCKFILES[*]}" >> "$GITHUB_OUTPUT"

        HAS_PKG_JSON=false
        if echo "$CHANGED_FILES" | grep -qF 'package.json'; then
          HAS_PKG_JSON=true
        fi

        FAILED=false
        for lf in "${LOCKFILES[@]}"; do
          if [ "$HAS_PKG_JSON" = "true" ]; then
            echo "✓ $lf change has corresponding package.json changes."
          else
            MSG="$lf was modified without any package.json changes. This could indicate lockfile tampering."
            if [ "$FAIL_ON_WARNING" = "true" ]; then
              echo "::error::$MSG"
              FAILED=true
            else
              echo "::warning::$MSG"
            fi
          fi
        done

        echo "tampered=$FAILED" >> "$GITHUB_OUTPUT"

        if [ "$FAILED" = "true" ]; then
          exit 1
        fi
